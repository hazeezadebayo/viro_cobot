# Configuration file for ZERO ERR drive
vendor_id: 0x5A65726F
product_id: 0x00029252
assign_activate: 0x003c # DC Synch register
auto_fault_reset: true  # true = automatic fault reset, false = fault reset on rising edge command interface "reset_fault"

rpdo:  # RxPDO (Master -> Slave) - 14 Bytes Total
  - index: 0x1600
    channels:
      - {index: 0x607a, sub_index: 0, type: int32}   # Target Position (4)
      - {index: 0x60fe, sub_index: 0, type: int32}   # Digital Outputs (4)
      - {index: 0x6071, sub_index: 0, type: int16}   # Target Torque (2)
      - {index: 0x60b2, sub_index: 0, type: int16}   # Torque Offset (2)
      - {index: 0x6040, sub_index: 0, type: uint16}  # Controlword (2)

tpdo:  # TxPDO (Slave -> Master) - 20 Bytes Total (incl padding)
  - index: 0x1A00
    channels:
      - {index: 0x6064, sub_index: 0, type: int32}   # Actual Position (4)
      - {index: 0x60fd, sub_index: 0, type: int32}   # Digital Inputs (4)
      - {index: 0x6041, sub_index: 0, type: uint16}  # Status word (2)
      - {index: 0x6077, sub_index: 0, type: int16}   # Actual Torque (2)
      - {index: 0x606c, sub_index: 0, type: int32}   # Actual Velocity (4)
      - {index: 0x603f, sub_index: 0, type: uint16}  # Error Code (2)
      - {index: 0x6061, sub_index: 0, type: uint8}   # Mode Display (1)

sm:  # Sync Manager
  - {index: 0, type: output, pdo: ~, watchdog: disable}
  - {index: 1, type: input, pdo: ~, watchdog: disable}
  - {index: 2, type: output, pdo: rpdo, watchdog: enable}
  - {index: 3, type: input, pdo: tpdo, watchdog: disable}


