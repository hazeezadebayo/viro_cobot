controller_manager:
  ros__parameters:
    update_rate: 1000
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    
    joint_trajectory_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"

    effort_direct_controller:
      type: "effort_controllers/JointGroupEffortController"

    gripper_controller:
      type: "joint_trajectory_controller/JointTrajectoryController"




joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - gripper_finger_left_joint
      - gripper_finger_right_joint




joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    interpolation_method: splines

    gains:
      joint_1: { p: 100., d: 1., i: 1., i_clamp: 1., ff_velocity_scale: 1.0 }
      joint_2: { p: 100., d: 1., i: 1., i_clamp: 1., ff_velocity_scale: 1.0 }
      joint_3: { p: 100., d: 1., i: 1., i_clamp: 1., ff_velocity_scale: 1.0 }
      joint_4: { p: 100., d: 1., i: 1., i_clamp: 1., ff_velocity_scale: 1.0 }
      joint_5: { p: 100., d: 1., i: 1., i_clamp: 1., ff_velocity_scale: 1.0 }
      joint_6: { p: 100., d: 1., i: 1., i_clamp: 1., ff_velocity_scale: 1.0 }

    allow_partial_joints_goal: false
    open_loop_control: false
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.0 # 0.01
      goal_time: 0.0
    use_sim_time: false




effort_direct_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity




gripper_controller:
  ros__parameters:
    joints:
      - gripper_finger_left_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    interpolation_method: splines

    gains:
      gripper_finger_left_joint: { p: 100., d: 1., i: 1., i_clamp: 1. }

    allow_partial_joints_goal: false
    open_loop_control: false
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.0
      goal_time: 0.0
    use_sim_time: true
